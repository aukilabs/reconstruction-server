name: Rust Test and Docker Build

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "bug/**"
      - "chore/**"
      - "hotfix/**"

jobs:
  rust-ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server/rust

      - name: Rust fmt check
        working-directory: server/rust
        run: cargo fmt --all --check

      - name: Rust clippy (deny warnings)
        working-directory: server/rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: server/rust
        run: cargo test --workspace --all-features --locked
  build:
    name: Build
    runs-on: [ubuntu-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build and push (noop)
        id: docker-build-and-push-noop
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/reconstruction-server:${{ github.sha }}-noop"
          echo "Building $IMAGE"
          docker build -t "$IMAGE" -f docker/Dockerfile_RUST .
          echo "Pushing $IMAGE"
          docker push "$IMAGE"

      - name: Docker build and push
        id: docker-build-and-push
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/reconstruction-server:${{ github.sha }}"
          echo "Building $IMAGE"
          docker build -t "$IMAGE" -f docker/Dockerfile .
          echo "Pushing $IMAGE"
          docker push "$IMAGE"
