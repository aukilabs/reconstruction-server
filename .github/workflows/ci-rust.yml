name: Rust Test and Docker Build

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "bug/**"
      - "chore/**"
      - "hotfix/**"

jobs:
  rust-ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server/rust

      - name: Rust fmt check
        working-directory: server/rust
        run: cargo fmt --all --check

      - name: Rust clippy (deny warnings)
        working-directory: server/rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: server/rust
        run: cargo test --workspace --all-features --locked
  build:
    name: Build
    runs-on: [ubuntu-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.GLOBAL_COMMON_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.GLOBAL_COMMON_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.GLOBAL_COMMON_AWS_REGION }}
      - name: Log in to AWS ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build and push
        id: docker-build-and-push
        run: |

          docker build \
            -t "${{ steps.ecr-login.outputs.registry }}/reconstruction-server:${{ github.ref_name }}" \
            --push \
            -f docker/Dockerfile \
            .
