name: Rust Test and Docker Build

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "bug/**"
      - "chore/**"
      - "hotfix/**"
    paths-ignore:
      - docker/Dockerfile.base
      - .github/workflows/build-base-image.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server/rust

      - name: Rust fmt check
        working-directory: server/rust
        run: cargo fmt --all --check

      - name: Rust clippy (deny warnings)
        working-directory: server/rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: server/rust
        run: cargo test --workspace --all-features --locked
  build:
    name: Build
    runs-on: [ubuntu-latest-4c16g150g]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build and push
        id: docker-build-and-push
        run: |
          IMAGE="aukilabs/reconstruction-node:${{ github.sha }}"
          echo "Building $IMAGE"
          docker build --build-arg RECONSTRUCTION_VERSION="${{ github.sha }}" -t "$IMAGE" -f docker/Dockerfile .
          echo "Pushing $IMAGE"
          docker push "$IMAGE"
