name: Docker Build and Push

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:

      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Extract the tag version
      - uses: actions/checkout@v2
      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      # Step 3: Replace the version number in a file
      - name: Update version in file
        env:
          TAG_VERSION: ${{ steps.vars.outputs.tag }}
        run: |
          sed -i 's/"reconstructionServerVersion": VERSION/"reconstructionServerVersion": "${TAG_VERSION}"/' utils/data_utils.py

      # Step 4: Login AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.GLOBAL_COMMON_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.GLOBAL_COMMON_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.GLOBAL_COMMON_AWS_REGION }}
      - name: Log in to AWS ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      # Step 5: Docker Build and Push
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build and push
        id: docker-build-and-push
        run: |
          tags="-t ${{ steps.ecr-login.outputs.registry }}/reconstruction-server:${{ steps.vars.outputs.tag }}"

          docker buildx create --use
          docker buildx build \
            --platform linux/amd64\
            ${tags} \
            -f ./Dockerfile \
            --push \
            .

          sleep 5
          rounds=15
          for i in $(seq 1 ${rounds}); do
            echo "Waiting for ECR image replication to finish (${i}/${rounds})..."
            aws ecr describe-image-replication-status --repository-name "reconstruction-server" --image-id "imageTag=${{ steps.vars.outputs.tag }}" --region "${{ vars.GLOBAL_COMMON_AWS_REGIO }}" --output text | grep IN_PROGRESS || break
            sleep 10
          done